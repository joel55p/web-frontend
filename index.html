<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Series Tracker</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="img/icon.png" type="image/png">
</head>
<body>

    <!-- Header -->
    <div class="header">
        <div class="logo">
            <div class="logo-dot"></div>
            Series Tracker
        </div>
        <button class="btn-primary" id="btnNueva">+ Añadir Serie</button>
    </div>

    <!-- Busqueda y ordenamiento -->
    <div class="toolbar">
        <input type="text" id="searchInput" placeholder="Search series..." class="search-input">
        <select id="sortSelect" class="select">
            <option value="id">Sort: Reciente</option>
            <option value="name">Nombre A–Z</option>
            <option value="total_episodes">Episodios Totales</option>
        </select>
        <select id="orderSelect" class="select">
            <option value="asc">Ascendente</option>
            <option value="desc">Descendente</option>
        </select>
    </div>

    <!-- Tabla -->
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Cover</th>
                    <th>Nombre</th>
                    <th>Progreso</th>
                    <th>Episodios</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="seriesBody">
                <!-- Filas que van a ser generadas desde ui.js -->
            </tbody>
        </table>
        <p id="emptyMsg" class="empty-msg" style="display:none">
            no hay ninguna serie aun  — agrega una bro!
        </p>
    </div>

    <!-- Paginación que se olviod-->
    <div id="paginacionWrap" style="display:none">
        <button id="btnPrev" class="btn-page">← Prev</button>
        <span id="pageInfo" class="page-info">Page 1</span>
        <button id="btnNext" class="btn-page">Next →</button>
    </div>

    <!-- Modal crear/editar -->
    <div id="modal" class="modal-overlay" style="display:none">
        <div class="modal-card">
            <h2 id="modalTitle">Añadir Serie</h2>
            <form id="serieForm">
                <input type="hidden" id="serieId">

                <label>Nombre *</label>
                <input type="text" id="fieldName" placeholder="e.g. Breaking Bad" required>

                <label>Episodio actual</label>
                <input type="number" id="fieldCurrent" min="0" value="1">

                <label>Episodios Totales *</label>
                <input type="number" id="fieldTotal" min="1" value="12" required>

                <label>Cover image URL</label>
                <input type="text" id="fieldImage" placeholder="https://...">

                <div class="modal-actions">
                    <button type="button" class="btn-cancel" id="btnCancelar">Cancelar</button>
                    <button type="submit" class="btn-save">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
